openapi: 3.1.0
info:
  title: E-Ticaret API
  description: |
    Staj 2026 E-Ticaret projesi backend sözleşmesi (v1).
    Modüller: Auth, Users, Addresses, Categories, Products, Cart, Orders, Favorites.

    ## Genel Kurallar
    - Tüm başarılı yanıtlar `{ "success": true, "data": ... }` zarfı ile döner;
      mutasyon uçları (POST/PUT/PATCH) ayrıca isteğe bağlı bir `message` alanı içerir.
    - `204 No Content` yanıtları HTTP semantiğine uygun olarak gövde içermez
      (ör. DELETE, logout).
    - Tüm hata yanıtları tek bir şema kullanır: `ErrorResponse` (validasyon
      hatalarında `ValidationErrorResponse`). RFC 9457 kullanılmaz.
    - Kaynak yoksa `404`, kaynak var ama iş kuralı ihlali varsa `422`,
      kaynak var ama başka kullanıcıya aitse `403` döner.
    - JWT gerektiren her endpoint için token hiç gönderilmemişse veya süresi
      dolmuşsa/geçersizse `401` döner (bkz. `components/responses/Unauthorized`).
      Bu, ilgili her endpoint'te ayrıca tekrar tekrar açıklanmaz; genel kuraldır.
    - İstemciden gelen JSON'ın bozuk olması (parse edilemeyen syntax), zorunlu bir
      alanın eksik olması veya beklenen tipte olmaması (ör. `quantity` için string
      gönderilmesi) durumunda `400` döner (bkz. `components/responses/BadRequest`).
      Bu da genel bir kuraldır; body veya query parametresi alan her endpoint için
      geçerlidir ve ayrıca tekrarlanmaz.
    - Tüm tarih/saat alanları (`createdAt` vb.) her zaman **UTC, "Z" sonekli**
      ISO 8601 / RFC 3339 formatında döner (ör. `2026-07-14T10:35:15Z`).
      Saat dilimi offset'i (`+03:00` gibi) kullanılmaz; local'e çevirme işi
      istemciye aittir.
    - Tüm parasal alanlar (`price`, `unitPrice`, `subtotal`, `total`) `number`
      tipinde ve en fazla 2 ondalık basamaklıdır (`multipleOf: 0.01`), para
      birimi her zaman TRY'dir. Backend tarafında Prisma `Decimal` ile tutulup
      response'a `number`'a çevrilerek yazılır; ondalık hassasiyeti bu adımda
      garanti edilir.
    - Ürün görsel URL'leri (`imageUrl`) her zaman absolute (tam) ve `https://`
      ile başlar; göreli path veya `http://` kabul edilmez. v1'de dosya yükleme
      servisi olmadığından (yalnızca URL saklanır), bu kısıt admin ürün
      oluştururken/güncellerken gönderdiği `imageUrl` değerine backend
      tarafından uygulanmalıdır; client'lar bu URL'i doğrudan `<img src>` /
      `Image` bileşenine verebilir, ek bir dönüşüm yapmasına gerek yoktur.
    - Auth uçlarında (`register`, `login`, `refresh`, `logout`) zorunlu
      `X-Client-Type: WEB | MOBILE` header'ı istemci tipini belirtir.
      `MOBILE` için refreshToken JSON gövdesinde döner; `WEB` için refreshToken
      JSON'da dönmez, yalnızca httpOnly+Secure+SameSite=Strict cookie olarak
      set edilir (XSS'e karşı; JS'ten okunamaz).

    ## v1 Kapsam Dışı (bilinçli olarak yok)
    Misafir sepeti, ürün varyantları (beden/renk/kapasite), kupon sistemi,
    kargo ücreti, gerçek ödeme entegrasyonu, sipariş iptali, ürün yorum/puanlama,
    alt kategoriler, fatura adresi, sosyal medya girişi, e-posta doğrulama,
    şifremi unuttum, görsel dosyası yükleme servisi (yalnızca URL).
  version: 1.1.0

servers:
  - url: http://localhost:3000/api/v1
    description: Local development

tags:
  - name: auth
    description: Kayıt, giriş, token yenileme ve çıkış işlemleri
  - name: users
    description: Giriş yapan kullanıcının profil bilgileri
  - name: addresses
    description: Kullanıcının kayıtlı teslimat adresleri
  - name: categories
    description: Ürün kategorileri (yalnızca ADMIN yönetir)
  - name: admin
    description: Yalnızca ADMIN rolüne sahip kullanıcıların erişebildiği yönetim işlemleri
  - name: products
    description: Ürün katalogu, arama ve filtreleme
  - name: cart
    description: Giriş yapmış kullanıcının sepeti
  - name: orders
    description: Sipariş geçmişi ve checkout
  - name: favorites
    description: Kullanıcının favori ürünleri

security:
  - bearerAuth: []

paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Yeni kullanıcı kaydı
      security: []
      parameters:
        - $ref: "#/components/parameters/ClientTypeHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, password, fullName]
              properties:
                email: { type: string, format: email, example: "ayse@example.com" }
                password: { type: string, minLength: 8, maxLength: 72, example: "Sifre123!" }
                fullName: { type: string, minLength: 2, maxLength: 100, example: "Ayşe Yılmaz" }
      responses:
        "201":
          description: Kullanıcı oluşturuldu
          headers:
            Set-Cookie:
              description: >
                Yalnızca `X-Client-Type: WEB` isteklerinde döner:
                `refreshToken=<token>; HttpOnly; Secure; SameSite=Strict; Path=/api/v1/auth`
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Giriş yap
      security: []
      parameters:
        - $ref: "#/components/parameters/ClientTypeHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, password]
              properties:
                email: { type: string, format: email, example: "ayse@example.com" }
                password: { type: string, minLength: 1, example: "Sifre123!" }
      responses:
        "200":
          description: Giriş başarılı
          headers:
            Set-Cookie:
              description: >
                Yalnızca `X-Client-Type: WEB` isteklerinde döner:
                `refreshToken=<token>; HttpOnly; Secure; SameSite=Strict; Path=/api/v1/auth`
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Access token'ı yenile
      description: >
        Kullanılan refreshToken geçersiz kılınır ve yerine yeni bir refreshToken
        döndürülür (rotation). Eski refreshToken tekrar kullanılamaz.
        `MOBILE` istemciler refreshToken'ı istek gövdesinde göndermelidir.
        `WEB` istemciler için refreshToken tarayıcı tarafından otomatik
        gönderilen cookie'den okunur; gövdede refreshToken alanı gerekmez.
      security: []
      parameters:
        - $ref: "#/components/parameters/ClientTypeHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                refreshToken:
                  type: string
                  description: >
                    `MOBILE` istemciler için zorunludur. `WEB` istemciler bu
                    alanı göndermez (cookie kullanılır); gönderilse de dikkate
                    alınmaz.
      responses:
        "200":
          description: Yeni token çifti
          headers:
            Set-Cookie:
              description: >
                Yalnızca `X-Client-Type: WEB` isteklerinde döner; rotate edilmiş
                yeni refreshToken cookie'sini set eder:
                `refreshToken=<newToken>; HttpOnly; Secure; SameSite=Strict; Path=/api/v1/auth`
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/TooManyRequests" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Çıkış yap (refresh token'ı geçersiz kılar)
      description: >
        `MOBILE` istemciler refreshToken'ı istek gövdesinde göndermelidir.
        `WEB` istemciler için refreshToken cookie'den okunur ve sunucu tarafında
        geçersiz kılınır; cookie ayrıca yanıt üzerinden temizlenir.
      parameters:
        - $ref: "#/components/parameters/ClientTypeHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                refreshToken:
                  type: string
                  description: "`MOBILE` istemciler için zorunludur. `WEB` istemciler bu alanı göndermez."
      responses:
        "204":
          description: Çıkış yapıldı
          headers:
            Set-Cookie:
              description: >
                Yalnızca `X-Client-Type: WEB` isteklerinde döner; refreshToken
                cookie'sini temizler: `refreshToken=; Max-Age=0; Path=/api/v1/auth`
              schema: { type: string }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== USERS ====================
  /users/me:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Giriş yapan kullanıcının profili
      responses:
        "200":
          description: Kullanıcı profili
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    patch:
      operationId: updateCurrentUser
      tags: [users]
      summary: Profil güncelle (kısmi güncelleme)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                fullName: { type: string, minLength: 2, maxLength: 100 }
                phone: { type: string, pattern: "^\\+?[0-9]{10,15}$", example: "+905551234567" }
      responses:
        "200":
          description: Güncellenmiş profil
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== ADDRESSES ====================
  /addresses:
    get:
      operationId: listAddresses
      tags: [addresses]
      summary: Giriş yapan kullanıcının kayıtlı teslimat adresleri
      responses:
        "200":
          description: Adres listesi (yalnızca kendi adresleri)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AddressListEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createAddress
      tags: [addresses]
      summary: Yeni teslimat adresi ekle
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddressInput" }
      responses:
        "201":
          description: Oluşturulan adres
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AddressEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /addresses/{addressId}:
    put:
      operationId: updateAddress
      tags: [addresses]
      summary: Adres güncelle (yalnızca kendi adresi)
      parameters:
        - $ref: "#/components/parameters/AddressIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddressInput" }
      responses:
        "200":
          description: Güncellenmiş adres
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AddressEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      operationId: deleteAddress
      tags: [addresses]
      summary: Adres sil (yalnızca kendi adresi; geçmiş siparişleri etkilemez)
      parameters:
        - $ref: "#/components/parameters/AddressIdPath"
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== CATEGORIES ====================
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: Kategori listesi
      security: []
      parameters:
        - name: includeInactive
          in: query
          description: "Yalnızca ADMIN için anlamlı; normal kullanıcıya her zaman yalnızca aktif kategoriler döner."
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Kategoriler
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryListEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== PRODUCTS ====================
  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: Ürünleri listele (sayfalama + arama + filtre + sıralama)
      security: []
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/SizeQuery"
        - name: search
          in: query
          description: Ürün adında büyük/küçük harf duyarsız arama
          schema: { type: string, maxLength: 100 }
        - name: categoryId
          in: query
          description: "Kategori id'si; birden fazla kategori için virgülle ayırın (örn. categoryId=cat1,cat2)"
          schema: { type: string }
        - name: minPrice
          in: query
          schema: { type: number, minimum: 0, multipleOf: 0.01 }
        - name: maxPrice
          in: query
          schema: { type: number, minimum: 0, multipleOf: 0.01 }
        - name: sort
          in: query
          description: >
            Ürünleri yalnızca tek bir alana göre sıralar.
            Alanın başındaki "-" işareti azalan sıralama anlamına gelir.
          schema:
            type: string
            enum:
              - name
              - -name
              - price
              - -price
              - createdAt
              - -createdAt
            examples:
              - price
        - name: includeInactive
          in: query
          description: "Yalnızca ADMIN için anlamlı (admin panelin pasif/tükenmiş ürünleri de görebilmesi için); normal kullanıcıya pasif ürünler hiçbir zaman dönmez."
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: "Ürün listesi (pasif ürünler normal kullanıcıya dönmez; stoku 0 olan aktif ürün listeye dahildir)"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductListEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Ürün detayı
      security: []
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      responses:
        "200":
          description: Ürün detayı
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== CART ====================
  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Giriş yapan kullanıcının sepeti
      responses:
        "200":
          description: Sepet (toplam backend tarafından hesaplanır)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Sepete ürün ekle (aynı ürün varsa miktarı artırır, yeni satır açmaz)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [productId, quantity]
              properties:
                productId: { type: string }
                quantity: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Güncellenmiş sepet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422":
          description: "Ürün pasif veya istenen miktar mevcut stoku aşıyor"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      status:
                        type: string
                        enum: [PRODUCT_INACTIVE, INSUFFICIENT_STOCK]
              example:
                success: false
                message: "Requested quantity exceeds available stock"
                statusCode: 422
                status: "INSUFFICIENT_STOCK"
        "500": { $ref: "#/components/responses/InternalServerError" }

  /cart/items/{itemId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Sepetteki ürün miktarını güncelle
      parameters:
        - $ref: "#/components/parameters/CartItemIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 1, maximum: 100 }
      responses:
        "200":
          description: Güncellenmiş sepet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CartEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    delete:
      operationId: removeCartItem
      tags: [cart]
      summary: Sepetten ürün çıkar
      parameters:
        - $ref: "#/components/parameters/CartItemIdPath"
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== ORDERS ====================
  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: Giriş yapan kullanıcının sipariş geçmişi
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/SizeQuery"
      responses:
        "200":
          description: Sipariş listesi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderListEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: createOrder
      tags: [orders]
      summary: Checkout — sepetten sipariş oluştur (ödeme simülasyonu)
      description: |
        Sırasıyla: sepet kontrolü → adresin kullanıcıya ait olduğu kontrolü →
        güncel fiyatların yeniden hesaplanması → stokların yeniden kontrolü →
        ödeme simülasyonu → sipariş oluşturma → stokların azaltılması → sepetin temizlenmesi.
        Sipariş sonrası iptal desteklenmez.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: >
            İstemci tarafından üretilen benzersiz anahtar (örn. UUID). Ağ tekrar
            denemesi veya çift tıklama nedeniyle aynı anahtarla yapılan tekrar
            istekler yeni sipariş oluşturmaz; ilk isteğin sonucu döndürülür.
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [addressId, paymentMethod]
              properties:
                addressId: { type: string }
                paymentMethod:
                  type: string
                  enum: [CREDIT_CARD]
                  description: "v1'de yalnızca simüle edilmiş kart ödemesi vardır; gerçek kart bilgisi saklanmaz."
      responses:
        "201":
          description: Sipariş oluşturuldu
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Sipariş detayı (yalnızca kendi siparişi)
      parameters:
        - $ref: "#/components/parameters/OrderIdPath"
      responses:
        "200":
          description: Sipariş detayı
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrderEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== FAVORITES ====================
  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      summary: Giriş yapan kullanıcının favori ürünleri
      responses:
        "200":
          description: Favori listesi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FavoriteListEnvelope" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalServerError" }
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Ürünü favorilere ekle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [productId]
              properties:
                productId: { type: string }
      responses:
        "201":
          description: Favoriye eklendi
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FavoriteEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /favorites/{productId}:
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Ürünü favorilerden çıkar
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      responses:
        "204": { description: Silindi }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  # ==================== ADMIN ====================
  /admin/categories:
    post:
      operationId: createCategory
      tags: [admin]
      summary: Kategori oluştur (yalnızca ADMIN)
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "201":
          description: Oluşturulan kategori
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /admin/categories/{categoryId}:
    put:
      operationId: updateCategory
      tags: [admin]
      summary: Kategori güncelle (yalnızca ADMIN, isActive dahil)
      x-roles: [ADMIN]
      parameters:
        - $ref: "#/components/parameters/CategoryIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CategoryInput" }
      responses:
        "200":
          description: Güncellenmiş kategori
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CategoryEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /admin/products:
    post:
      operationId: createProduct
      tags: [admin]
      summary: Ürün oluştur (yalnızca ADMIN)
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "201":
          description: Oluşturulan ürün
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalServerError" }

  /admin/products/{productId}:
    put:
      operationId: updateProduct
      tags: [admin]
      summary: Ürün bilgilerini, fiyatını, stoğunu ve durumunu güncelle (yalnızca ADMIN, isActive dahil)
      x-roles: [ADMIN]
      parameters:
        - $ref: "#/components/parameters/ProductIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductInput" }
      responses:
        "200":
          description: Güncellenmiş ürün
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProductEnvelope" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalServerError" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT ile korunan endpoint'ler. Kullanıcı yalnızca kendi verisine erişebilir;
        ADMIN gerektiren uçlar x-roles ile işaretlenmiştir. accessToken ~15 dakika,
        refreshToken ~30 gün geçerlidir (bkz. AuthResponse.expiresIn). accessToken
        her zaman `Authorization: Bearer` header'ı ile gönderilir; refreshToken'ın
        teslim şekli istemci tipine göre değişir (bkz. X-Client-Type header'ı).

  parameters:
    ClientTypeHeader:
      name: X-Client-Type
      in: header
      required: true
      description: >
        İstemci tipini belirtir. Bu değere göre refreshToken teslim şekli değişir:
        `MOBILE` için refreshToken JSON gövdesinde döner (istemci Keychain/Keystore'da
        saklar). `WEB` için refreshToken JSON'da DÖNMEZ; bunun yerine httpOnly, Secure,
        SameSite=Strict bir cookie olarak set edilir ve tarayıcı dışında hiçbir koda
        (JS dahil) açık değildir.
      schema:
        type: string
        enum: [WEB, MOBILE]
    PageQuery:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    SizeQuery:
      name: size
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }
    AddressIdPath:
      name: addressId
      in: path
      required: true
      schema: { type: string }
    CategoryIdPath:
      name: categoryId
      in: path
      required: true
      schema: { type: string }
    ProductIdPath:
      name: productId
      in: path
      required: true
      schema: { type: string }
    OrderIdPath:
      name: orderId
      in: path
      required: true
      schema: { type: string }
    CartItemIdPath:
      name: itemId
      in: path
      required: true
      schema: { type: string }

  responses:
    BadRequest:
      description: İstek gövdesi doğrulama hatası içeriyor
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationErrorResponse" }
          example:
            success: false
            message: "Validation failed"
            statusCode: 400
            status: "BAD_REQUEST"
            errors:
              - field: "email"
                message: "Email is required"
    Unauthorized:
      description: Token yok, geçersiz veya süresi dolmuş
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "Invalid or expired token"
            statusCode: 401
            status: "UNAUTHORIZED"
    Forbidden:
      description: Kullanıcının bu işlem için yetkisi yok
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "You do not have permission to perform this action"
            statusCode: 403
            status: "FORBIDDEN"
    NotFound:
      description: Kaynak bulunamadı
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "Resource not found"
            statusCode: 404
            status: "NOT_FOUND"
    Conflict:
      description: Kaynak zaten mevcut / çakışma
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "Resource already exists"
            statusCode: 409
            status: "CONFLICT"
    UnprocessableEntity:
      description: İş kuralı ihlali (stok yetersiz, ürün pasif, ödeme simülasyonu başarısız vb.)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "Business rule violation"
            statusCode: 422
            status: "UNPROCESSABLE_ENTITY"
    TooManyRequests:
      description: İstek sınırı aşıldı
      headers:
        Retry-After:
          description: Yeniden deneme için beklenmesi gereken saniye
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "Too many requests, please try again later"
            statusCode: 429
            status: "TOO_MANY_REQUESTS"
    InternalServerError:
      description: Beklenmeyen sunucu hatası
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
          example:
            success: false
            message: "An unexpected error occurred"
            statusCode: 500
            status: "INTERNAL_SERVER_ERROR"

  schemas:
    # ---------- Error shapes ----------
    ErrorResponse:
      type: object
      description: >
        Tüm hata yanıtlarının ortak zarfı. Gerçek örnek değerler (message,
        statusCode, status) her status koduna özgü olarak ilgili
        components.responses girdisinde (ör. NotFound, Forbidden) tanımlıdır;
        bu şema yalnızca alan yapısını tarif eder.
      required: [success, message, statusCode, status]
      properties:
        success:
          type: boolean
          enum: [false]
        message:
          type: string
          description: "Kullanıcıya gösterilebilecek, insan tarafından okunabilir hata mesajı"
        statusCode:
          type: integer
          description: "HTTP durum koduyla birebir aynı değer"
        status:
          type: string
          description: "statusCode'a karşılık gelen sabit; frontend'in message string'ini parse etmeden dallanabilmesi içindir"
          enum:
            - BAD_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - UNPROCESSABLE_ENTITY
            - TOO_MANY_REQUESTS
            - INTERNAL_SERVER_ERROR
            - SERVICE_UNAVAILABLE

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          required: [errors]
          properties:
            errors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field: { type: string, example: "email" }
                  message: { type: string, example: "Email is required" }

    # ---------- Success envelope ----------
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean, enum: [true] }
        message: { type: string }

    # ---------- Domain schemas ----------
    Role:
      type: string
      enum: [USER, ADMIN]

    AuthResponse:
      type: object
      properties:
        accessToken: { type: string, readOnly: true }
        refreshToken:
          type: string
          readOnly: true
          nullable: true
          description: >
            Yalnızca `X-Client-Type: MOBILE` isteklerinde dolu döner. `WEB`
            isteklerinde bu alan `null` olur; refreshToken bunun yerine
            httpOnly+Secure+SameSite=Strict bir cookie olarak set edilir
            (bkz. ilgili endpoint'in Set-Cookie yanıt başlığı).
        expiresIn:
          type: integer
          readOnly: true
          description: accessToken'ın saniye cinsinden geçerlilik süresi
          example: 900
        user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      properties:
        id: { type: string, readOnly: true }
        email: { type: string, format: email }
        fullName: { type: string }
        phone: { type: string }
        role:
          allOf:
            - $ref: "#/components/schemas/Role"
          readOnly: true
        createdAt: { type: string, format: date-time, readOnly: true, example: "2026-07-14T10:35:15Z" }

    AddressInput:
      type: object
      additionalProperties: false
      required: [recipientName, phone, city, district, addressLine, postalCode]
      properties:
        title:
          type: string
          maxLength: 30
          description: "Kullanıcının adrese verdiği etiket, örn. 'Ev', 'İş'"
          example: "Ev"
        recipientName: { type: string, minLength: 2, maxLength: 100 }
        phone: { type: string, pattern: "^\\+?[0-9]{10,15}$", example: "+905551234567" }
        city: { type: string, minLength: 2, maxLength: 60 }
        district: { type: string, minLength: 2, maxLength: 60 }
        addressLine: { type: string, minLength: 10, maxLength: 250 }
        postalCode: { type: string, pattern: "^[0-9]{5}$", example: "34000" }

    Address:
      allOf:
        - $ref: "#/components/schemas/AddressInput"
        - type: object
          properties:
            id: { type: string, readOnly: true }

    CategoryInput:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string, minLength: 2, maxLength: 100 }
        slug:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          maxLength: 120
          description: "Boş bırakılırsa name alanından otomatik türetilir; benzersiz olmalıdır."
          example: "elektronik-ev-aletleri"
        isActive:
          type: boolean
          default: true
          description: "Kalıcı silme yoktur; kategori bu alanla aktif/pasif yapılır."

    Category:
      allOf:
        - $ref: "#/components/schemas/CategoryInput"
        - type: object
          properties:
            id: { type: string, readOnly: true }

    ProductImageInput:
      type: object
      additionalProperties: false
      required: [imageUrl]
      properties:
        imageUrl:
          type: string
          format: uri
          pattern: "^https://"
          description: "Her zaman absolute (tam) URL, https:// ile başlamalıdır. Göreli path veya http:// kabul edilmez."
          example: "https://cdn.example.com/products/urun-1.jpg"
        isPrimary: { type: boolean, default: false }
        sortOrder: { type: integer, default: 0, minimum: 0 }

    ProductImage:
      allOf:
        - $ref: "#/components/schemas/ProductImageInput"
        - type: object
          properties:
            id: { type: string, readOnly: true }

    ProductInput:
      type: object
      additionalProperties: false
      description: "Tek fiyat, tek stok; varyant modeli (beden/renk/kapasite) yok."
      required: [name, price, stock, categoryId]
      properties:
        name: { type: string, minLength: 2, maxLength: 150 }
        description: { type: string, maxLength: 2000, nullable: true }
        price:
          type: number
          exclusiveMinimum: 0
          multipleOf: 0.01
          description: "KDV dahil, TRY"
          example: 149.90
        stock: { type: integer, minimum: 0 }
        categoryId: { type: string }
        isActive:
          type: boolean
          default: true
          description: "Kalıcı silme yoktur; ürün bu alanla aktif/pasif yapılır."
        images:
          type: array
          maxItems: 10
          items: { $ref: "#/components/schemas/ProductImageInput" }

    Product:
      type: object
      properties:
        id: { type: string, readOnly: true }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { type: number, multipleOf: 0.01, description: "KDV dahil, TRY" }
        currency: { type: string, default: "TRY" }
        stock: { type: integer }
        isActive: { type: boolean }
        category: { $ref: "#/components/schemas/Category" }
        images:
          type: array
          items: { $ref: "#/components/schemas/ProductImage" }

    Pagination:
      type: object
      properties:
        page: { type: integer, example: 1 }
        size: { type: integer, example: 20 }
        total: { type: integer, example: 134 }
        totalPages: { type: integer, example: 7 }
        hasNext: { type: boolean, example: true }
        hasPrevious: { type: boolean, example: false }

    PaginatedProducts:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Product" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    PaginatedOrders:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        pagination: { $ref: "#/components/schemas/Pagination" }

    CartItem:
      type: object
      properties:
        id: { type: string, readOnly: true }
        productId: { type: string }
        productName: { type: string, readOnly: true }
        unitPrice:
          type: number
          multipleOf: 0.01
          readOnly: true
          description: "Backend tarafından hesaplanır, frontend'in gönderdiği fiyata güvenilmez"
        quantity: { type: integer }
        subtotal: { type: number, multipleOf: 0.01, readOnly: true }

    Cart:
      type: object
      properties:
        id: { type: string, readOnly: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/CartItem" }
        total: { type: number, multipleOf: 0.01, readOnly: true, description: "Backend tarafından hesaplanır" }

    OrderItem:
      type: object
      description: "Sipariş anındaki ürün bilgisinin anlık görüntüsü (snapshot)"
      properties:
        productId: { type: string }
        productName: { type: string }
        unitPrice: { type: number, multipleOf: 0.01 }
        quantity: { type: integer }
        subtotal: { type: number, multipleOf: 0.01 }

    OrderAddressSnapshot:
      type: object
      description: "Sipariş anında adresin anlık görüntüsü; adres sonradan silinse/değişse bile sipariş etkilenmez"
      properties:
        recipientName: { type: string }
        phone: { type: string }
        city: { type: string }
        district: { type: string }
        addressLine: { type: string }
        postalCode: { type: string }

    Order:
      type: object
      properties:
        id: { type: string, readOnly: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/OrderItem" }
        status:
          type: string
          enum: [PENDING, PAID, SHIPPED, DELIVERED]
          description: "Kullanıcı siparişi iptal edemez; iptal durumu v1'de yoktur."
        total: { type: number, multipleOf: 0.01, description: "Ürünlerin toplam fiyatına eşittir; kargo ücreti ve ek vergi yoktur" }
        currency: { type: string, default: "TRY" }
        shippingAddress: { $ref: "#/components/schemas/OrderAddressSnapshot" }
        createdAt: { type: string, format: date-time, readOnly: true, example: "2026-07-14T10:35:15Z" }

    Favorite:
      type: object
      properties:
        id: { type: string, readOnly: true }
        product: { $ref: "#/components/schemas/Product" }
        createdAt: { type: string, format: date-time, readOnly: true, example: "2026-07-14T10:35:15Z" }

    # ---------- Envelope wrappers (one per response payload) ----------
    AuthEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/AuthResponse" } }

    UserEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/User" } }

    AddressEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/Address" } }

    AddressListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Address" }

    CategoryEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/Category" } }

    CategoryListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Category" }

    ProductEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/Product" } }

    ProductListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/PaginatedProducts" } }

    CartEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/Cart" } }

    OrderEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/Order" } }

    OrderListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/PaginatedOrders" } }

    FavoriteEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties: { data: { $ref: "#/components/schemas/Favorite" } }

    FavoriteListEnvelope:
      allOf:
        - $ref: "#/components/schemas/SuccessEnvelope"
        - type: object
          properties:
            data:
              type: array
              items: { $ref: "#/components/schemas/Favorite" }
